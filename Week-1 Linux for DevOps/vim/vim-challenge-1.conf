# =====================================================================
#  VIM EDITING DRILLS  --  "aim, then act"   (operator + target)
# ---------------------------------------------------------------------
#  Fix every FIXME using ONLY the keys named in its hint. Press Esc
#  first; no arrow keys, no mouse. Each FIXME says what the line SHOULD
#  become, so you can check yourself. Save with :w  (or :wq when done).
#  Reset any time with  :e!   (reload file, discard your edits).
# =====================================================================

server {

    # FIXME 1  (ciw)  ->  change the typo "localhots" to  localhost
    server_name  localhots;

    # FIXME 2  (ci")  ->  change the path inside the quotes to  /var/www/orbit
    set $root  "/var/www/old";

    # FIXME 3  (ci( )  ->  change what's inside the parens to  max=100
    limit_conn  zone (max=10);

    # FIXME 4  (ct;)  ->  cursor on the 9, type  ct;  then  8080  (port becomes 8080)
    listen  9090;

    # FIXME 5  (f" then ci")  ->  change the scheme to  https
    proxy_set_header  X-Forwarded-Proto  "http";

    # FIXME 6  (dd)  ->  delete the duplicate line so only ONE remains
    worker_connections  1024;
    worker_connections  1024;

    # FIXME 7  (yy then p)  ->  duplicate the line below so there are TWO copies
    upstream_server  10.0.0.10:8080;

    # FIXME 8  (d/timeout)  ->  cursor on the b of "broken", delete up to "timeout"
    #          (the line should end up as:  timeout  30s;)
    broken extra words remove these timeout  30s;

    # FIXME 9  (A)  ->  append   # reviewed   to the very END of this line
    gzip  on;

    # FIXME 10 (o)  ->  open a NEW line below and add:  keepalive_timeout 65;
    sendfile  on;

    # FIXME 11 (cc)  ->  whole line is wrong; rewrite it as:
    #          access_log /var/log/orbit/access.log;
    access_log  off  wrong  path  here;

    # FIXME 12 (ciw then . . )  ->  fix the first word with  ciw  (type: done),
    #          then press  w  to the next word and  .  to repeat  (all three -> done)
    fixme fixme fixme

}

