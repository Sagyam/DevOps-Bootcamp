services:

  webb:
    image: nginx:v1
    image: nginx:v1
    porst:
      - "8080:80"
    depends_on:
      - db
    # environment:
    #   - APP_ENV=production
    #   - LOG_LEVEL=info

  worker:
    image: myorg/worker:v1
    command: ["python", "worker.py"]
    depends_on:
      - db

  db:
    image: postgres:v1
    environment:
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=app

  cache:
    image: redis:v1
    ports:
      - "6379:6379"


